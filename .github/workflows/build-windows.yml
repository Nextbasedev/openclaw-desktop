name: Build Windows installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:tauri
        env:
          # Tauri NSIS bundler downloads its toolchain on first run
          TAURI_SIGNING_PRIVATE_KEY: ""

      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows-installers
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
