[package]
name = "app"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6" }

[dev-dependencies]
tempfile = "3"

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", features = ["clock"] }
dirs = "6"
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
futures-util = "0.3"
http = "1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.10.3" }
tauri-plugin-fs = "2"
tauri-plugin-log = "2"
tokio = { version = "1", features = ["fs", "macros", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = "0.24"
portable-pty = "0.8"
walkdir = "2"
# SQLite with bundled SQLite for zero-config deployment
rusqlite = { version = "0.32", features = ["bundled", "chrono", "uuid"] }
refinery = { version = "0.8", features = ["rusqlite"] }
uuid = { version = "1", features = ["v4"] }
# Native secure storage for profile tokens
keyring = { version = "3", features = ["linux-native", "linux-native-sync-persistent"] }
